<div
  id="heroCarousel"
  class="carousel slide"
  data-bs-ride="carousel"
  data-bs-interval="3000"
  data-bs-pause="false"
>
  <div class="carousel-inner">
    <!-- Slide 1 -->
    <div class="carousel-item active">
      <img
        src="assets/images/hero/hero-53.png"
        class="d-block w-50"
        alt="Nature"
      />
      <div class="carousel-caption d-none d-md-block">
        <h1 class="display-4">Explore the World</h1>
        <p>Discover breathtaking places with us.</p>
      </div>
    </div>
    <!-- Slide 2 -->
    <div class="carousel-item">
      <img
        src="assets/images/hero/hero-51.png"
        class="d-block w-50"
        alt="Tech"
      />
      <div class="carousel-caption d-none d-md-block">
        <h1 class="display-4">Innovate With Tech</h1>
        <p>Harness the power of modern technology.</p>
      </div>
    </div>
    <!-- Slide 3 -->
    <div class="carousel-item">
      <img
        src="assets/images/hero/hero-5.png"
        class="d-block w-50"
        alt="City"
      />
      <div class="carousel-caption d-none d-md-block">
        <h1 class="display-4">Urban Adventures</h1>
        <p>Experience the heartbeat of modern cities.</p>
      </div>
    </div>
  </div>

  <!-- Indicators -->
  <div class="carousel-indicators">
    <button
      type="button"
      data-bs-target="#heroCarousel"
      data-bs-slide-to="0"
      class="active"
      aria-current="true"
    ></button>
    <button
      type="button"
      data-bs-target="#heroCarousel"
      data-bs-slide-to="1"
    ></button>
    <button
      type="button"
      data-bs-target="#heroCarousel"
      data-bs-slide-to="2"
    ></button>
  </div>

  <!-- Controls -->
</div>
