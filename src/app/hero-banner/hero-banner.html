<div class="position-relative">
  <div
    id="heroCarousel"
    class="carousel slide"
    data-bs-ride="carousel"
    data-bs-interval="4000"
    data-bs-pause="false"
  >
    <div class="carousel-inner">
      <div class="carousel-item active">
        <img
          src="assets/images/hero/Hero-1.png"
          class="d-block w-100"
          alt="IT Services"
        />
      </div>
      <div class="carousel-item">
        <img
          src="assets/images/hero/Hero-2.png"
          class="d-block w-100"
          alt="Cloud Services"
        />
      </div>
      <div class="carousel-item">
        <img
          src="assets/images/hero/Hero-3.png"
          class="d-block w-100"
          alt="Support"
        />
      </div>
    </div>

    <!-- Caption Overlay -->
    <div class="hero-caption-overlay text-white">
      <h1 class="fw-bold">
        Empowering Your Business with Innovative IT Solutions
      </h1>
      <p>Expert-driven services for growth, security, and transformation.</p>
    </div>

    <!-- Indicators -->
    <div class="carousel-indicators">
      <button
        type="button"
        data-bs-target="#heroCarousel"
        data-bs-slide-to="0"
        class="active"
        aria-current="true"
      ></button>
      <button
        type="button"
        data-bs-target="#heroCarousel"
        data-bs-slide-to="1"
      ></button>
      <button
        type="button"
        data-bs-target="#heroCarousel"
        data-bs-slide-to="2"
      ></button>
    </div>
  </div>
</div>
